name: ergoguard_hk
description: ErgoGuard HK AI - Personal Ergonomic Guardian for HK Workers
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Camera & Pose Detection
  camera: ^0.10.5+5
  google_mlkit_pose_detection: ^0.10.0
  
  # Sensors (Gyroscope)
  sensors_plus: ^4.0.2
  
  # Text-to-Speech (Cantonese voice alerts)
  flutter_tts: ^3.8.5
  
  # Haptic feedback
  haptic_feedback: ^0.5.1+1
  
  # Local storage
  shared_preferences: ^2.2.2
  
  # PDF export
  pdf: ^3.10.7
  path_provider: ^2.1.1
  share_plus: ^7.2.1
  
  # UI
  fl_chart: ^0.65.0
  percent_indicator: ^4.2.3
  
  # Permissions
  permission_handler: ^11.1.0
  
  # Localisation
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
