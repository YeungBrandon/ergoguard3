name: Build ErgoGuard APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Create Flutter project scaffold
        run: |
          flutter create --org com.ergoguard --project-name ergoguard_hk --platforms android /tmp/ergoguard_scaffold
          cp -r /tmp/ergoguard_scaffold/android/. ./android/
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 24/' android/app/build.gradle
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 24/' android/app/build.gradle
          sed -i 's/minSdk flutter.minSdkVersion/minSdk 24/' android/app/build.gradle

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ErgoGuard-HK-AI
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
